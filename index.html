<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
                <div class="scene">
                <div class="card-npc">
                <div class="neon-orb orb-top-left"></div>
                <div class="neon-orb orb-bottom-right"></div>

                <div class="title-wrap">
                    <h1 class="main-title">Create Your Little NPC</h1>
                    <p class="subtitle">Every world needs a little magic... yours starts here ♡</p>
                </div>

                <div class="row g-4 align-items-start">
                    <div class="col-md-7 left-area">
                    <form id="signupForm">
                        <div class="mb-3">
                        <label for="name" class="form-label">Your Name ✿</label>
                        <input type="text" class="form-control npc-input" id="name" />
                        </div>

                        <div class="mb-3">
                        <label for="email" class="form-label">Magic Mail ✉</label>
                        <input type="email" class="form-control npc-input" id="email" />
                        </div>

                        <div class="mb-4">
                        <label for="password" class="form-label">Secret Spell 🔒</label>
                        <input type="password" class="form-control npc-input" id="password" />
                        </div>

                        <button type="submit" class="btn-world">Enter the World</button>

                        <p class="bottom-link mb-0">
                        Already have a chronicled path?
                        <a href="#">Awaken here</a>
                        </p>
                    </form>
                    </div>

                    <div class="col-md-5 right-area ps-md-4">
                    <div class="essence-title">Choose Your Essence</div>

                    <div class="essence-grid">
                        <div class="essence-item">
                        <button type="button" class="essence-btn active">
                            <i class="bi bi-stars"></i>
                        </button>
                        <span class="essence-label">Dreamer</span>
                        </div>

                        <div class="essence-item">
                        <button type="button" class="essence-btn">
                            <i class="bi bi-palette-fill"></i>
                        </button>
                        <span class="essence-label">Creator</span>
                        </div>

                        <div class="essence-item">
                        <button type="button" class="essence-btn">
                            <i class="bi bi-moon-stars-fill"></i>
                        </button>
                        <span class="essence-label">Star</span>
                        </div>

                        <div class="essence-item">
                        <button type="button" class="essence-btn">
                            <i class="bi bi-brush-fill"></i>
                        </button>
                        <span class="essence-label">Artist</span>
                        </div>
                    </div>

                    <div class="bar-title">Mana</div>
                    <div class="custom-bar mana-bar"></div>

                    <div class="bar-title mt-4">HP</div>
                    <div class="custom-bar hp-bar"></div>
                    </div>
                </div>
                </div>
            </div>

            <div class="success-popup" id="successPopup">
                <div class="success-box">
                <div class="success-icon">
                    <i class="bi bi-stars"></i>
                </div>
                <h2 class="success-title">Welcome to the world ✨</h2>
                <p class="success-text">
                    Your little NPC has been created successfully.
                </p>
                <button class="btn-close-popup" id="closePopup">Continue</button>
                </div>
            </div>

          

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>  
   <script>
    const form = document.getElementById("signupForm");
    const popup = document.getElementById("successPopup");
    const closePopup = document.getElementById("closePopup");
    const essenceButtons = document.querySelectorAll(".essence-btn");

    essenceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        essenceButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
      });
    });

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      popup.classList.add("show");
    });

    closePopup.addEventListener("click", function () {
      popup.classList.remove("show");
    });

    popup.addEventListener("click", function (e) {
      if (e.target === popup) {
        popup.classList.remove("show");
      }
    });
  </script>
</body>
</html>
